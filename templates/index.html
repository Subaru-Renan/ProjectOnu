<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ONU — Árvore Interativa</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body>
    <!-- ── Loading ──────────────────────────────────────── -->
    <div id="loadingScreen">
      <div class="loading-globe">🌍</div>
      <div class="loading-title">Carregando ONU</div>
      <div class="loading-bar"><div class="loading-bar-fill"></div></div>
      <div class="loading-msg">Consultando REST Countries API…</div>
    </div>

    <!-- ── Header ───────────────────────────────────────── -->
    <header>
      <div class="header-inner">
        <div class="logo-area">
          <div class="un-emblem">🌐</div>
          <div class="logo-text">
            <div class="logo-title">ONU</div>
            <div class="logo-sub">Árvore Interativa de Nações</div>
          </div>
        </div>

        <div class="header-controls">
          <!-- Search + method -->
          <div class="search-wrap">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="searchInput" placeholder="Buscar país…" />
          </div>
          <select
            id="searchMethod"
            style="
              background: var(--surface2);
              border: 1px solid var(--border);
              border-radius: 7px;
              padding: 8px 10px;
              color: var(--text-muted);
              font-size: 12px;
              outline: none;
              cursor: pointer;
            "
          >
            <option value="dfs">DFS</option>
            <option value="bfs">BFS</option>
          </select>

          <button class="btn" id="btnExpand">▼ Expandir</button>
          <button class="btn" id="btnCollapse">▲ Recolher</button>
          <button class="btn success" id="btnEdit">✎ Editar Árvore</button>
        </div>
      </div>
    </header>

    <!-- ── Stats bar ─────────────────────────────────────── -->
    <div id="statsBar" style="display: flex">
      <div class="stat-item">
        <div class="stat-dot"></div>
        Continentes: <span class="stat-value" id="sCont">—</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" style="background: var(--un-blue)"></div>
        Regiões: <span class="stat-value" id="sReg">—</span>
      </div>
      <div class="stat-item">
        <div class="stat-dot" style="background: var(--accent2)"></div>
        Países: <span class="stat-value" id="sCoun">—</span>
      </div>
    </div>

    <!-- ── Traversal panel ───────────────────────────────── -->
    <div id="traversalPanel" style="display: flex">
      <span class="trav-label">Caminhamento:</span>
      <div class="trav-btns">
        <button class="btn" id="btnPreOrder">Pré-ordem</button>
        <button class="btn" id="btnInOrder">Em-ordem</button>
        <button class="btn" id="btnPostOrder">Pós-ordem</button>
      </div>
      <div class="trav-result empty" id="travResult">
        Execute um caminhamento para ver a ordem de visitação…
      </div>
    </div>

    <!-- ── Insert / Delete panel ────────────────────────── -->
    <div id="editPanel">
      <!-- Insert -->
      <div class="edit-group">
        <label>Nome do País</label>
        <input class="edit-input" id="insertName" placeholder="Ex: Wakanda" />
      </div>
      <div class="edit-group">
        <label>Continente</label>
        <input
          class="edit-input"
          id="insertContinent"
          placeholder="Ex: Africa"
        />
      </div>
      <div class="edit-group">
        <label>Região</label>
        <input
          class="edit-input"
          id="insertRegion"
          placeholder="Ex: Eastern Africa"
        />
      </div>
      <div class="edit-actions">
        <button class="btn success" id="btnInsert">＋ Inserir</button>
      </div>

      <!-- Separator -->
      <div
        style="
          width: 1px;
          background: var(--border);
          align-self: stretch;
          margin: 0 8px;
        "
      ></div>

      <!-- Delete confirm -->
      <div class="edit-actions" style="gap: 10px">
        <span id="deleteInfo" style="font-size: 12px; color: var(--text-muted)">
          Clique em <b style="color: var(--danger)">✕</b> em qualquer país para
          remover.
        </span>
        <button class="btn danger" id="btnConfirmDelete">
          ✕ Confirmar Exclusão
        </button>
        <button class="btn" id="btnCancelDelete">Cancelar</button>
      </div>
    </div>

    <!-- ── Tree ──────────────────────────────────────────── -->
    <div class="main-container">
      <div id="treeContainer"></div>
      <div id="errBox" style="display: none"></div>
    </div>

    <!-- ── Path display (toast) ──────────────────────────── -->
    <div id="pathDisplay">
      <span class="path-label">Caminho:</span>
      <span class="path-value"></span>
    </div>

    <!-- ── Scripts ───────────────────────────────────────── -->
    <script>
      // For Flask version, use the /api/tree endpoint
      // For standalone, override with REST Countries direct URL
      window.API_ENDPOINT =
        "https://restcountries.com/v3.1/all?fields=name,region,subregion,flags,population,area,capital,cca3";
    </script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
